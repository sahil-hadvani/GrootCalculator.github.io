<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRP Next Size Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --bg-light: #f8fafc;
      --bg-card-light: #ffffff;
      --text-light: #1e293b;
      --text-muted-light: #64748b;
      --border-light: #e2e8f0;
      --shadow-light: 0 20px 25px -5px rgba(0, 0,0, 0.1);
      --screenshot-bg: #f8fafc;
    }

    [data-theme="dark"] {
      --bg-light: #0f172a;
      --bg-card-light: #1e293b;
      --text-light: #f8fafc;
      --text-muted-light: #cbd5e1;
      --border-light: #334155;
      --shadow-light: 0 20px 25px -5px rgba(0, 0,0, 0.4);
      --screenshot-bg: #0f172a;
    }

    * {
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg-light);
      min-height: 100vh;
      color: var(--text-light);
      transition: all 0.3s ease;
    }

    .glass-effect {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .glass-effect-dark {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card {
      border-radius: 24px;
      border: none;
      box-shadow: var(--shadow-light);
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .btn-primary-custom {
      background: var(--primary-gradient);
      border: none;
      border-radius: 16px;
      padding: 12px 32px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-primary-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
    }

    .btn-screenshot {
      background: var(--secondary-gradient);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
      transition: all 0.3s ease;
    }

    .btn-screenshot:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 12px 35px rgba(245, 87, 108, 0.6);
    }

    .input-group-custom {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .input-group-custom:focus-within {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }

    .form-control {
      background: transparent;
      border: none;
      color: inherit;
      font-size: 16px;
    }

    .form-control:focus {
      background: transparent;
      box-shadow: none;
      color: inherit;
    }

    .form-control:disabled {
      background: rgba(255, 255, 255, 0.05);
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auto-calc-badge {
      background: rgba(79, 172, 254, 0.2);
      color: #4facfe;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }

    .result-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: var(--primary-gradient);
      color: white;
      font-size: 20px;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      transform: scale(1.1) rotate(180deg);
    }

    .floating-label {
      position: relative;
    }

    .floating-label label {
      position: absolute;
      top: -10px;
      left: 15px;
      background: rgba(255, 255, 255, 0.9);
      padding: 0 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted-light);
      transition: all 0.3s ease;
    }

    [data-theme="dark"] .floating-label label {
      background: rgba(30, 41, 59, 0.9);
      color: var(--text-muted-light);
    }

    /* DARKER VIBRANT RESULT CARDS */
    .metric-card {
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      color: white;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      font-weight: 600;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .metric-card:hover::before {
      left: 100%;
    }

    .metric-card:hover {
      transform: scale(1.08) translateY(-8px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.3) !important;
    }

    .metric-card .h2 {
      font-size: 2.2rem !important;
      font-weight: 700 !important;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      margin-bottom: 8px !important;
    }

    .metric-card .label {
      font-size: 0.85rem;
      font-weight: 600;
      text-shadow: 0 1px 5px rgba(0,0,0,0.4);
      margin-bottom: 4px;
    }

    .metric-card .unit {
      font-size: 0.75rem;
      opacity: 0.9;
      font-weight: 500;
    }

    /* Area Card - Deep Indigo */
    .metric-card.area-card {
      background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 50%, #581c87 100%);
      box-shadow: 0 15px 35px rgba(30, 58, 138, 0.6);
    }

    /* Min Weight - Deep Teal */
    .metric-card.minwt-card {
      background: linear-gradient(135deg, #0f766e 0%, #115e59 50%, #047857 100%);
      box-shadow: 0 15px 35px rgba(16, 126, 110, 0.6);
    }

    /* Max Weight - Deep Orange */
    .metric-card.maxwt-card {
      background: linear-gradient(135deg, #c2410c 0%, #dc2626 50%, #b91c1c 100%);
      box-shadow: 0 15px 35px rgba(194, 65, 12, 0.6);
    }

    /* Avg Weight - Deep Purple */
    .metric-card.avgwt-card {
      background: linear-gradient(135deg, #7c3aed 0%, #9333ea 50%, #a855f7 100%);
      box-shadow: 0 15px 35px rgba(124, 58, 237, 0.6);
    }

    /* Price - Deep Gold */
    .metric-card.price-card {
      background: linear-gradient(135deg, #d97706 0%, #b45309 50%, #92400e 100%);
      box-shadow: 0 15px 35px rgba(217, 119, 6, 0.6);
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px 15px;
      }
      
      .metric-card {
        margin-bottom: 15px;
      }
      
      .metric-card .h2 {
        font-size: 1.8rem !important;
      }
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .screenshot-area {
      background: var(--screenshot-bg) !important;
      position: relative;
    }
  </style>
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle">
    <i class="fas fa-moon"></i>
  </button>

  <!-- Particles Background -->
  <div class="particles" id="particles"></div>

  <div class="container py-5 screenshot-area">
    <div class="text-center mb-5">
      <h1 class="display-4 fw-bold mb-3" style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
        FRP Calculator
      </h1>
      <p class="lead text-muted">Enter LBH dimensions - Auto calculates everything else!</p>
    </div>

    <!-- Calculator Card -->
    <div class="card glass-effect mb-4">
      <div class="card-body p-5">
        <div class="row g-4">
          <!-- Dimensions (User Input Only) -->
          <div class="col-md-4">
            <div class="floating-label">
              <label><i class="fas fa-ruler-horizontal me-1"></i>Length (L)</label>
              <div class="input-group input-group-custom">
                <span class="input-group-text bg-transparent border-0"><i class="fas fa-ruler-horizontal"></i></span>
                <input type="number" id="length" class="form-control" placeholder="Enter Length">
              </div>
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="floating-label">
              <label><i class="fas fa-ruler-vertical me-1"></i>Breadth (B)</label>
              <div class="input-group input-group-custom">
                <span class="input-group-text bg-transparent border-0"><i class="fas fa-ruler-vertical"></i></span>
                <input type="number" id="breadth" class="form-control" placeholder="Enter Breadth">
              </div>
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="floating-label">
              <label><i class="fas fa-cube me-1"></i>Height (H)</label>
              <div class="input-group input-group-custom">
                <span class="input-group-text bg-transparent border-0"><i class="fas fa-cube"></i></span>
                <input type="number" id="height" class="form-control" placeholder="Enter Height">
              </div>
            </div>
          </div>

          <!-- Auto-calculated Parameters (DISABLED) -->
          <div class="col-md-4">
            <div class="floating-label">
              <label><i class="fas fa-vector-square me-1"></i>Base Area <span class="auto-calc-badge ms-1">(Auto)</span></label>
              <div class="input-group input-group-custom">
                <span class="input-group-text bg-transparent border-0"><i class="fas fa-vector-square"></i></span>
                <input type="number" id="baseArea" class="form-control" value="1440" disabled>
              </div>
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="floating-label">
              <label><i class="fas fa-weight-hanging me-1"></i>Min Weight <span class="auto-calc-badge ms-1">(Auto)</span></label>
              <div class="input-group input-group-custom">
                <span class="input-group-text bg-transparent border-0"><i class="fas fa-weight-hanging"></i></span>
                <input type="number" id="minWt" class="form-control" value="4" disabled>
              </div>
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="floating-label">
              <label><i class="fas fa-weight-scale me-1"></i>Max Weight <span class="auto-calc-badge ms-1">(Auto)</span></label>
              <div class="input-group input-group-custom">
                <span class="input-group-text bg-transparent border-0"><i class="fas fa-weight-scale"></i></span>
                <input type="number" id="maxWt" class="form-control" value="6" disabled>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="floating-label">
              <label><i class="fas fa-rupee-sign me-1"></i>Price per Kg <span class="auto-calc-badge ms-1">(Auto)</span></label>
              <div class="input-group input-group-custom">
                <span class="input-group-text bg-transparent border-0">₹</span>
                <input type="number" id="rate" class="form-control" value="1837" disabled>
              </div>
            </div>
          </div>

          <!-- Action Button -->
          <div class="col-12 text-center pt-3">
            <button class="btn btn-primary-custom btn-lg px-5" id="calcBtn">
              <i class="fas fa-magic me-2"></i>Auto Calculate
            </button>
            <div class="mt-3 small text-muted">
              <i class="fas fa-info-circle me-1"></i>Enter only LBH dimensions - Everything else auto-calculates!
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Results Section -->
    <div class="result-box p-5 d-none" id="result">
      <div class="text-center mb-5">
        <h3 class="mb-2"><i class="fas fa-chart-line me-2"></i>✨ Calculation Results</h3>
        <div class="btn-screenshot btn-sm ms-2" id="shareBtn" title="Screenshot Results">
          <i class="fas fa-camera"></i>
        </div>
      </div>
      
      <div class="row g-4">
        <!-- Parting Area -->
        <div class="col-md-2 col-sm-6">
          <div class="metric-card area-card h-100">
            <div class="h2 mb-2" id="areaRes">0</div>
            <div class="label">Parting Area</div>
            <div class="unit">sq.in</div>
          </div>
        </div>
        
        <!-- Min Weight -->
        <div class="col-md-2 col-sm-6">
          <div class="metric-card minwt-card h-100">
            <div class="h2 mb-2" id="minWtRes">0</div>
            <div class="label">Min Weight</div>
            <div class="unit">kg</div>
          </div>
        </div>
        
        <!-- Max Weight -->
        <div class="col-md-2 col-sm-6">
          <div class="metric-card maxwt-card h-100">
            <div class="h2 mb-2" id="maxWtRes">0</div>
            <div class="label">Max Weight</div>
            <div class="unit">kg</div>
          </div>
        </div>
        
        <!-- Avg Weight -->
        <div class="col-md-3 col-sm-6">
          <div class="metric-card avgwt-card h-100">
            <div class="h2 mb-2" id="avgWtRes">0</div>
            <div class="label fw-bold">Avg Weight</div>
            <div class="unit">kg</div>
          </div>
        </div>
        
        <!-- Price -->
        <div class="col-md-3 col-sm-6">
          <div class="metric-card price-card h-100">
            <div class="h2 mb-2" id="priceRes">₹0</div>
            <div class="label fw-bold">Estimated Price</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Theme Toggle
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    
    if (localStorage.getItem('theme') === 'dark' || 
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      body.setAttribute('data-theme', 'dark');
      themeToggle.querySelector('i').className = 'fas fa-sun';
    }

    themeToggle.addEventListener('click', () => {
      const isDark = body.getAttribute('data-theme') === 'dark';
      body.setAttribute('data-theme', isDark ? 'light' : 'dark');
      themeToggle.querySelector('i').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    });

    // FIXED VALUES (Auto-calculate)
    const FIXED_VALUES = {
      baseArea: 1440,
      minWt: 4,
      maxWt: 6,
      rate: 1837
    };

    // Auto-calculation on LBH input ONLY
    function autoCalculate() {
      let L = parseFloat($('#length').val());
      let B = parseFloat($('#breadth').val());
      let H = parseFloat($('#height').val());

      if(!L || !B || !H) {
        $('#result').addClass('d-none');
        return;
      }

      // Set fixed values (disabled inputs)
      $('#baseArea').val(FIXED_VALUES.baseArea);
      $('#minWt').val(FIXED_VALUES.minWt);
      $('#maxWt').val(FIXED_VALUES.maxWt);
      $('#rate').val(FIXED_VALUES.rate);

      // Original calculation logic
      let baseArea = FIXED_VALUES.baseArea;
      let minWt = FIXED_VALUES.minWt;
      let maxWt = FIXED_VALUES.maxWt;
      let rate = FIXED_VALUES.rate;

      let partArea = ((L*B)*3) + ((L*H)*2) + ((B*4)*2) + ((L*4)*2);
      let ratio = partArea/baseArea;

      let newMinWt = (minWt*ratio).toFixed(2);
      let newMaxWt = (maxWt*ratio).toFixed(2);
      let avgWt = ((parseFloat(newMinWt)+parseFloat(newMaxWt))/2).toFixed(2);
      let price = (avgWt*rate).toFixed(0);

      // Update results
      $('#areaRes').text(partArea.toFixed(2));
      $('#minWtRes').text(newMinWt);
      $('#maxWtRes').text(newMaxWt);
      $('#avgWtRes').text(avgWt);
      $('#priceRes').text('₹' + price);

      // Show results with animation
      $('#result').removeClass('d-none').hide().fadeIn(500);
    }

    // Auto-trigger on LBH input
    $('#length, #breadth, #height').on('input', function() {
      autoCalculate();
    });

    // Manual calculate button (for show)
    $('#calcBtn').click(function() {
      autoCalculate();
    });

    // PERFECT Screenshot (Solid UI Background)
    $('#screenshotBtn, #shareBtn').click(function(){
      // Hide theme toggle and particles for clean screenshot
      const themeToggle = $('#themeToggle').hide();
      const particles = $('#particles').hide();
      
      html2canvas(document.querySelector('.screenshot-area'), {
        scale: 2,
        useCORS: true,
        backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--screenshot-bg').trim(),
        logging: false,
        allowTaint: true,
        width: document.querySelector('.screenshot-area').scrollWidth,
        height: document.querySelector('.screenshot-area').scrollHeight
      }).then(canvas => {
        // Restore hidden elements
        themeToggle.show();
        particles.show();
        
        // Download
        const link = document.createElement('a');
        link.download = 'FRP_Calculator_' + new Date().toISOString().slice(0,10) + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        // Success toast
        const toast = $('<div class="toast align-items-center text-white bg-success border-0 position-fixed" style="top: 20px; right: 20px; z-index: 9999;" role="alert"><div class="d-flex"><div class="toast-body">Screenshot saved! 📸</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>');
        $('body').append(toast);
        const bsToast = new bootstrap.Toast(toast[0]);
        bsToast.show();
      }).catch(err => {
        themeToggle.show();
        particles.show();
        alert('Screenshot failed. Please try again.');
      });
    });

    // Enhanced particles
    function createParticle() {
      const particle = document.createElement('div');
      const colors = ['#667eea', '#764ba2', '#f5576c', '#00f2fe'];
      particle.style.cssText = `
        position: fixed;
        width: 6px;
        height: 6px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
        left: ${Math.random() * 100}vw;
        animation: float 8s infinite linear;
        box-shadow: 0 0 10px currentColor;
      `;
      particle.animate([
        { transform: 'translateY(100vh) scale(0)', opacity: 0 },
        { transform: 'translateY(-100px) scale(1)', opacity: 1 }
      ], {
        duration: 8000,
        easing: 'linear'
      }).onfinish = () => particle.remove();
      
      document.getElementById('particles').appendChild(particle);
    }

    setInterval(createParticle, 250);
  </script>

  <!-- html2canvas for screenshot -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
