<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Box Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    min-height:100vh;
    background: linear-gradient(-45deg,#1d2671,#c33764,#0f2027,#2c5364);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display:flex;
    align-items:center;
}

@keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.glass-card{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    color:#fff;
}

.glass-card h2{
    font-weight:700;
    letter-spacing:1px;
}

.form-control{
    border-radius:10px;
    border:none;
    padding:12px;
}

.form-control:focus{
    box-shadow:0 0 10px rgba(255,255,255,0.6);
}

.btn-calc{
    background: linear-gradient(45deg,#ff512f,#dd2476);
    border:none;
    padding:12px;
    border-radius:50px;
    font-weight:600;
    transition:0.3s ease;
}

.btn-calc:hover{
    transform:scale(1.05);
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.result-box{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    display:none;
}

.result-box p{
    margin-bottom:8px;
    font-size:16px;
}

.result-box span{
    font-weight:600;
    color:#ffd369;
}
</style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="glass-card">

                <h2 class="text-center mb-4">✨ Box Price & Weight Calculator</h2>

                <div class="row g-3">
                    <div class="col-md-4">
                        <label>Length (inch)</label>
                        <input type="number" class="form-control" id="length" />
                    </div>
                    <div class="col-md-4">
                        <label>Breadth (inch)</label>
                        <input type="number" class="form-control" id="breadth" />
                    </div>
                    <div class="col-md-4">
                        <label>Height (inch)</label>
                        <input type="number" class="form-control" id="height" />
                    </div>
                </div>

                <hr class="text-light">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label>Rate per Sq Inch (₹)</label>
                        <input type="number" class="form-control" id="rate" value="6.75" />
                    </div>
                    <div class="col-md-6">
                        <label>Reference Weight (kg)</label>
                        <input type="number" class="form-control" id="refWeight" value="10.5" />
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button class="btn btn-calc btn-lg" id="calculate">Calculate Now 🚀</button>
                </div>

                <div class="result-box" id="result">
                    <p>📦 Volume: <span id="volume"></span> cubic inch</p>
                    <p>📐 Surface Area: <span id="surface"></span> sq inch</p>
                    <p>💰 Estimated Price: ₹ <span id="price"></span></p>
                    <p>⚖ Estimated Weight: <span id="weight"></span> kg</p>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
$(function(){

    $("#calculate").click(function(){

        let L = parseFloat($("#length").val());
        let B = parseFloat($("#breadth").val());
        let H = parseFloat($("#height").val());
        let rate = parseFloat($("#rate").val());
        let refWeight = parseFloat($("#refWeight").val());

        if(!L || !B || !H){
            alert("Please enter all dimensions");
            return;
        }

        let volume = L * B * H;
        let surface = 2 * ((L*B) + (B*H) + (L*H));
        let price = surface * rate;
        let refVolume = 24 * 24 * 24;
        let weight = (volume / refVolume) * refWeight;

        $("#volume").text(volume.toFixed(2));
        $("#surface").text(surface.toFixed(2));
        $("#price").text(price.toFixed(2));
        $("#weight").text(weight.toFixed(2));

        $("#result").fadeIn(500);
    });

});
</script>

</body>
</html>
